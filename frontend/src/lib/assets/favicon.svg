<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <title>Nexus</title>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4753e"/>
      <stop offset="100%" stop-color="#b45828"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="28" fill="#1C1917"/>
  <!-- Connection lines -->
  <line x1="64" y1="40" x2="36" y2="78" stroke="#a8a29e" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="40" x2="92" y2="78" stroke="#a8a29e" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="78" x2="92" y2="78" stroke="#a8a29e" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="40" x2="64" y2="96" stroke="#a8a29e" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="78" x2="64" y2="96" stroke="#a8a29e" stroke-width="3" stroke-linecap="round"/>
  <line x1="92" y1="78" x2="64" y2="96" stroke="#a8a29e" stroke-width="3" stroke-linecap="round"/>
  <!-- Central hub node -->
  <circle cx="64" cy="64" r="14" fill="url(#g)"/>
  <!-- Outer nodes -->
  <circle cx="64" cy="40" r="9" fill="url(#g)"/>
  <circle cx="36" cy="78" r="9" fill="url(#g)"/>
  <circle cx="92" cy="78" r="9" fill="url(#g)"/>
  <circle cx="64" cy="96" r="9" fill="url(#g)"/>
</svg>
